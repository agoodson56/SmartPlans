<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlans — AI-Powered Construction Document Analysis</title>
    <meta name="description"
        content="Upload your construction documents and get AI-powered analysis, symbol counting, specification review, and automated RFI generation filtered by discipline.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-grid" aria-hidden="true">
        <div class="bg-grid-lines"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <!-- Main Shell -->
    <div id="app-shell">
        <!-- Header -->
        <header id="app-header">
            <div class="header-logo">
                <img src="3d-logo.png" alt="3D Technology Services" width="38" height="38" style="border-radius:8px;">
            </div>
            <div class="header-text">
                <h1>SmartPlans</h1>
                <p>AI-Powered Construction Document Analysis</p>
            </div>
            <div id="usage-stats" style="margin-left:auto;display:flex;align-items:center;gap:8px;">
                <div style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);" title="Total bids processed">
                    <span style="font-size:13px;">#️⃣</span>
                    <span id="stat-bid-count" style="font-size:13px;font-weight:700;color:#10b981;">0</span>
                    <span style="font-size:11px;color:rgba(16,185,129,0.6);">bids</span>
                </div>
                <div style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);" title="Total AI API cost">
                    <span style="font-size:13px;">💰</span>
                    <span id="stat-total-cost" style="font-size:13px;font-weight:700;color:#f59e0b;">$0.00</span>
                    <span style="font-size:11px;color:rgba(245,158,11,0.6);">spent</span>
                </div>
                <button id="btn-reset-stats" onclick="UsageStats.confirmReset()" style="display:none;padding:4px 8px;border-radius:6px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f43f5e;cursor:pointer;font-size:13px;transition:all 0.2s;" title="Reset counters (Admin only)">↺</button>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <a href="user-guide.html" target="_blank" rel="noopener" class="saved-est-btn" title="User Guide" style="text-decoration:none;">
                    📖 <span class="saved-est-label">User Guide</span>
                </a>
                <button id="btn-saved-estimates" class="saved-est-btn" onclick="showSavedEstimates()"
                    title="Saved Estimates">
                    📂 <span class="saved-est-label">Saved Estimates</span>
                </button>
            </div>
        </header>

        <!-- Step Navigation -->
        <nav id="step-nav" aria-label="Wizard steps"></nav>

        <!-- Step Content -->
        <main id="step-content" role="region" aria-live="polite">
            <div style="padding:40px;text-align:center;color:rgba(255,255,255,0.4);" id="loading-indicator">
                Loading SmartPlans...
            </div>
        </main>

        <!-- Footer Navigation -->
        <footer id="step-footer"></footer>
    </div>

    <script>
        window.onerror = function (msg, url, line, col, err) {
            var el = document.getElementById('step-content');
            if (el) {
                el.textContent = '';
                var wrapper = document.createElement('div');
                wrapper.style.cssText = 'padding:40px;color:#f43f5e;font-family:monospace;';
                var h = document.createElement('h2');
                h.style.cssText = 'color:#f43f5e;margin-bottom:12px;';
                h.textContent = 'JavaScript Error';
                wrapper.appendChild(h);
                var pMsg = document.createElement('p');
                pMsg.innerHTML = '<strong>Message:</strong> ';
                pMsg.appendChild(document.createTextNode(msg));
                wrapper.appendChild(pMsg);
                var pFile = document.createElement('p');
                pFile.innerHTML = '<strong>File:</strong> ';
                pFile.appendChild(document.createTextNode(url));
                wrapper.appendChild(pFile);
                var pLine = document.createElement('p');
                pLine.innerHTML = '<strong>Line:</strong> ';
                pLine.appendChild(document.createTextNode(line + ', Col: ' + col));
                wrapper.appendChild(pLine);
                if (err && err.stack) {
                    var pre = document.createElement('pre');
                    pre.style.cssText = 'white-space:pre-wrap;margin-top:12px;font-size:12px;color:#f59e0b;';
                    pre.textContent = err.stack;
                    wrapper.appendChild(pre);
                }
                el.appendChild(wrapper);
            }
        };
        // If app.js fails to load entirely, show error after 5 seconds
        setTimeout(function () {
            var el = document.getElementById('loading-indicator');
            if (el) {
                el.innerHTML = '<div style="color:#f43f5e;font-family:monospace;">' +
                    '<h2 style="color:#f43f5e;margin-bottom:12px;">app.js failed to load</h2>' +
                    '<p>The application script did not execute. Check browser console (F12) for details.</p>' +
                    '<p style="margin-top:12px;color:#f59e0b;">Possible causes: file not found (404), MIME type mismatch, or syntax error.</p>' +
                    '</div>';
            }
        }, 5000);
    </script>
    <script
      src="https://js.sentry-cdn.com/60b02e5d7804fc77476c97324b9039e5.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      if (typeof Sentry !== 'undefined' && typeof Sentry.init === 'function') {
        Sentry.init({
          dsn: "https://60b02e5d7804fc77476c97324b9039e5@o4511099720957952.ingest.us.sentry.io/4511099752284160",
          environment: location.hostname.includes('localhost') ? 'development' : 'production',
          release: 'smartplans@5.0.0',
          tracesSampleRate: 0.1,
          replaysSessionSampleRate: 0,
          replaysOnErrorSampleRate: 1.0,
          initialScope: { tags: { app: 'smartplans' } },
        });
        console.log('[SmartPlans] Sentry error tracking initialized');
      }
    </script>
    <script>
        // SheetJS CDN with fallback — try primary, then jsDelivr mirror
        (function () {
            function loadScript(src, onSuccess, onFail) {
                var s = document.createElement('script');
                s.src = src;
                s.onload = onSuccess;
                s.onerror = onFail;
                document.head.appendChild(s);
            }
            loadScript(
                'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js',
                function () { console.log('[SmartPlans] SheetJS loaded (primary CDN)'); },
                function () {
                    console.warn('[SmartPlans] Primary SheetJS CDN failed, trying fallback…');
                    loadScript(
                        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
                        function () { console.log('[SmartPlans] SheetJS loaded (fallback CDN)'); },
                        function () { console.error('[SmartPlans] SheetJS failed to load from all CDNs — Excel export will use CSV fallback'); }
                    );
                }
            );
        })();
    </script>
    <script>
        // PDF.js for text extraction — improves AI accuracy on specification documents
        (function () {
            function loadScript(src, onSuccess, onFail) {
                var s = document.createElement('script'); s.src = src;
                s.onload = onSuccess; s.onerror = onFail;
                document.head.appendChild(s);
            }
            loadScript(
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
                function () {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    console.log('[SmartPlans] PDF.js loaded');
                },
                function () {
                    loadScript(
                        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',
                        function () {
                            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
                            console.log('[SmartPlans] PDF.js loaded (fallback CDN)');
                        },
                        function () { console.warn('[SmartPlans] PDF.js unavailable — text extraction disabled'); }
                    );
                }
            );
        })();
    </script>
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script src="pricing-database.js"></script>
    <script src="prevailing-wages-ca.js"></script>
    <script src="prevailing-wages-national.js"></script>
    <script src="export-engine.js"></script>
    <script src="proposal-generator.js"></script>
    <script src="ai-engine.js"></script>
    <script src="app.js"
        onerror="document.getElementById('step-content').innerHTML='<div style=\'padding:40px;color:#f43f5e;font-family:monospace;\'><h2>app.js failed to load (404)</h2><p>The script file was not found on the server.</p></div>'"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('[SmartPlans] Service Worker registered');
                // Check for updates every 5 minutes
                setInterval(() => reg.update(), 5 * 60 * 1000);
            }).catch(err => console.warn('[SmartPlans] SW registration failed:', err));
        }
    </script>
</body>

</html>
