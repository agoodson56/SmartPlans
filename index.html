    <script>
        window.onerror = function (msg, url, line, col, err) {
            var el = document.getElementById('step-content');
            if (el) {
                el.textContent = '';
                var wrapper = document.createElement('div');
                wrapper.style.cssText = 'padding:40px;color:#f43f5e;font-family:monospace;';
                var h = document.createElement('h2');
                h.style.cssText = 'color:#f43f5e;margin-bottom:12px;';
                h.textContent = 'JavaScript Error';
                wrapper.appendChild(h);
                var pMsg = document.createElement('p');
                pMsg.innerHTML = '<strong>Message:</strong> ';
                pMsg.appendChild(document.createTextNode(msg));
                wrapper.appendChild(pMsg);
                var pFile = document.createElement('p');
                pFile.innerHTML = '<strong>File:</strong> ';
                pFile.appendChild(document.createTextNode(url));
                wrapper.appendChild(pFile);
                var pLine = document.createElement('p');
                pLine.innerHTML = '<strong>Line:</strong> ';
                pLine.appendChild(document.createTextNode(line + ', Col: ' + col));
                wrapper.appendChild(pLine);
                if (err && err.stack) {
                    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                        var pre = document.createElement('pre');
                        pre.textContent = err.stack;
                        pre.style.cssText = 'margin-top:10px;font-size:11px;white-space:pre-wrap;max-height:200px;overflow:auto;padding:8px;background:rgba(0,0,0,0.04);border-radius:4px;';
                        wrapper.appendChild(pre);
                    }
                    console.error('[SmartPlans] Stack:', err.stack);
                }
                el.appendChild(wrapper);
            }
        };
        // If app.js fails to load entirely, show error after 5 seconds
        setTimeout(function () {
            var el = document.getElementById('loading-indicator');
            if (el) {
                el.innerHTML = '<div style="color:#f43f5e;font-family:monospace;">' +
                    '<h2 style="color:#f43f5e;margin-bottom:12px;">app.js failed to load</h2>' +

                    '<p style="margin-top:12px;color:#f59e0b;">Possible causes: file not found (404), MIME type mismatch, or syntax error.</p>' +
                    '</div>';
            }
        }, 5000);
    </script>

    <script>
        // ═══ CACHE BUSTER — Runs FIRST, before SW registration ═══
        // If the old SW is serving stale files, nuke everything and reload fresh
        // NOTE: No hardcoded version — only bust if there are 2+ different smartplans caches
        // (meaning an old one is stuck alongside the new one). Single cache = healthy state.
        (async function cacheBuster() {
            if (!('serviceWorker' in navigator)) return;
            try {
                var keys = await caches.keys();
                var spCaches = keys.filter(function(k) { return k.startsWith('smartplans-'); });
                // Only bust if there are MULTIPLE smartplans caches (old stuck alongside new)
                // A single cache (old or new) is fine — the SW update flow handles the transition
                if (spCaches.length > 1) {
                    console.log('[CacheBuster] Multiple caches detected: ' + spCaches.join(', ') + ' — nuking stale ones');
                    // Keep the newest (highest version), delete the rest
                    spCaches.sort();
                    var newest = spCaches.pop();
                    await Promise.all(spCaches.map(function(k) { return caches.delete(k); }));
                    console.log('[CacheBuster] Cleaned up old caches, kept: ' + newest);
                }
            } catch (e) {
                console.warn('[CacheBuster] Error:', e);
            }
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => {
                console.log('[SmartPlans] Service Worker registered');

                // Check for updates every 60 seconds
                setInterval(() => reg.update(), 60 * 1000);

                // When a new SW is found, tell it to take over immediately
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    if (!newWorker) return;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && reg.waiting) {
                            reg.waiting.postMessage('SKIP_WAITING');
                            _showUpdateBanner();
                        }
                        if (newWorker.state === 'activated') {
                            _showUpdateBanner();
                        }
                    });
                });

                // If a SW is already waiting from a previous visit, activate it now
                if (reg.waiting) {
                    reg.waiting.postMessage('SKIP_WAITING');
                    _showUpdateBanner();
                }
            }).catch(err => console.warn('[SmartPlans] SW registration failed:', err));

            // Listen for the new SW taking control
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (window._swReloading) return;
                window._swReloading = true;
                location.reload();
            });
        }

        function _showUpdateBanner() {
            if (document.getElementById('sp-update-banner')) return;
            var banner = document.createElement('div');
            banner.id = 'sp-update-banner';
            banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99999;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);cursor:pointer;animation:sp-slide-up 0.3s ease;';
            banner.innerHTML = '<span style="font-size:20px;">🔄</span> New version available <button onclick="location.reload()" style="background:white;color:#6366f1;border:none;padding:6px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-left:4px;">Update Now</button>';
            document.body.appendChild(banner);
            // User must click "Update Now" — no auto-reload to prevent data loss during active use
        }
    </script>
