    <script>
        window.onerror = function (msg, url, line, col, err) {
            var el = document.getElementById('step-content');
            if (el) {
                el.textContent = '';
                var wrapper = document.createElement('div');
                wrapper.style.cssText = 'padding:40px;color:#f43f5e;font-family:monospace;';
                var h = document.createElement('h2');
                h.style.cssText = 'color:#f43f5e;margin-bottom:12px;';
                h.textContent = 'JavaScript Error';
                wrapper.appendChild(h);
                var pMsg = document.createElement('p');
                pMsg.innerHTML = '<strong>Message:</strong> ';
                pMsg.appendChild(document.createTextNode(msg));
                wrapper.appendChild(pMsg);
                var pFile = document.createElement('p');
                pFile.innerHTML = '<strong>File:</strong> ';
                pFile.appendChild(document.createTextNode(url));
                wrapper.appendChild(pFile);
                var pLine = document.createElement('p');
                pLine.innerHTML = '<strong>Line:</strong> ';
                pLine.appendChild(document.createTextNode(line + ', Col: ' + col));
                wrapper.appendChild(pLine);
                if (err && err.stack) {
                    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                        var pre = document.createElement('pre');
                        pre.textContent = err.stack;
                        pre.style.cssText = 'margin-top:10px;font-size:11px;white-space:pre-wrap;max-height:200px;overflow:auto;padding:8px;background:rgba(0,0,0,0.04);border-radius:4px;';
                        wrapper.appendChild(pre);
                    }
                    console.error('[SmartPlans] Stack:', err.stack);
                }
                el.appendChild(wrapper);
            }
        };
        // If app.js fails to load entirely, show error after 5 seconds
        setTimeout(function () {
            var el = document.getElementById('loading-indicator');
            if (el) {
                el.innerHTML = '<div style="color:#f43f5e;font-family:monospace;">' +
                    '<h2 style="color:#f43f5e;margin-bottom:12px;">app.js failed to load</h2>' +
                    '<p>The application script did not execute. Check browser console (F12) for details.</p>' +
                    '<p style="margin-top:12px;color:#f59e0b;">Possible causes: file not found (404), MIME type mismatch, or syntax error.</p>' +
                    '</div>';
            }
        }, 5000);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('[SmartPlans] Service Worker registered');

                // Check for updates every 60 seconds (was 5 min)
                setInterval(() => reg.update(), 300 * 1000); // Check for updates every 5 min (was 60s)

                // When a new SW is found, auto-apply it
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    if (!newWorker) return;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'activated') {
                            // New version is live — show update banner
                            _showUpdateBanner();
                        }
                    });
                });

                // Also handle the case where a new SW is already waiting
                if (reg.waiting) _showUpdateBanner();
            }).catch(err => console.warn('[SmartPlans] SW registration failed:', err));

            // Listen for the new SW taking control
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (window._swReloading) return;
                window._swReloading = true;
                location.reload();
            });
        }

        function _showUpdateBanner() {
            if (document.getElementById('sp-update-banner')) return;
            var banner = document.createElement('div');
            banner.id = 'sp-update-banner';
            banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99999;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);cursor:pointer;animation:sp-slide-up 0.3s ease;';
            banner.innerHTML = '<span style="font-size:20px;">🔄</span> New version available <button onclick="location.reload()" style="background:white;color:#6366f1;border:none;padding:6px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-left:4px;">Update Now</button> <button onclick="this.parentElement.remove()" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;margin-left:4px;" title="Dismiss">✕</button>';
            document.body.appendChild(banner);
            // No auto-reload — user clicks "Update Now" when ready
            // Previous 5-second auto-reload was destroying unsaved work
        }
    </script>
